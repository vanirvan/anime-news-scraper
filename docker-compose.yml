version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: anime-news-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-anime_news}
    ports:
      - "${POSTGRES_PORT:-54321}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - anime-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Jakarta}
      - N8N_RESTRICT_FILE_ACCESS_TO=/data
    volumes:
      - n8n_data:/home/node/.n8n
      - ./output:/data
    depends_on:
      - postgres
    networks:
      - anime-network

volumes:
  postgres_data:
  n8n_data:

networks:
  anime-network:
    driver: bridge
